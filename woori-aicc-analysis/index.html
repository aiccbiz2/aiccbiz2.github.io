<html lang="ko">
<head>

<title>우리금융캐피탈 AICC 사업 현황</title>

<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F8F9FC;--card:#fff;--border:#E8EDF5;
  --blue:#2563EB;--blue-light:#EFF6FF;--blue-mid:#BFDBFE;
  --green:#16A34A;--green-light:#F0FDF4;
  --yellow:#CA8A04;--yellow-light:#FEFCE8;
  --red:#DC2626;--red-light:#FEF2F2;
  --purple:#7C3AED;--purple-light:#F5F3FF;
  --gray:#6B7280;--dark:#111827;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--dark);line-height:1.6}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}

/* Layout */
.app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
.sidebar{background:#1E293B;position:sticky;top:0;height:100vh;overflow-y:auto;padding:24px 0}
.sidebar-logo{padding:0 24px 24px;border-bottom:1px solid rgba(255,255,255,0.1)}
.sidebar-logo h1{font-size:15px;font-weight:700;color:#fff;line-height:1.4}
.sidebar-logo p{font-size:11px;color:#94A3B8;margin-top:4px}
.sidebar-nav{padding:16px 0}
.sidebar-nav a{display:flex;align-items:center;gap:10px;padding:10px 24px;color:#94A3B8;text-decoration:none;font-size:13px;font-weight:500;transition:all 0.2s;border-left:3px solid transparent}
.sidebar-nav a:hover,.sidebar-nav a.active{color:#fff;background:rgba(255,255,255,0.06);border-left-color:#3B82F6}
.sidebar-nav .section-title{font-size:10px;font-weight:700;color:#475569;letter-spacing:2px;padding:16px 24px 6px;text-transform:uppercase}
.main{overflow-y:auto;max-height:100vh}
.page{padding:40px 48px;max-width:1100px}
.section{margin-bottom:60px}

/* Headers */
.page-title{font-size:28px;font-weight:900;color:var(--dark);margin-bottom:4px}
.page-sub{font-size:14px;color:var(--gray);margin-bottom:32px}
.sec-title{font-size:18px;font-weight:800;color:var(--dark);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.sec-title::before{content:'';width:4px;height:20px;background:var(--blue);border-radius:2px;display:inline-block}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px}
.card-sm{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px}

/* Grid */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:700}
.badge-blue{background:var(--blue-light);color:var(--blue)}
.badge-green{background:var(--green-light);color:var(--green)}
.badge-yellow{background:var(--yellow-light);color:var(--yellow)}
.badge-red{background:var(--red-light);color:var(--red)}
.badge-purple{background:var(--purple-light);color:var(--purple)}
.badge-gray{background:#F1F5F9;color:var(--gray)}

/* Status dot */
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.dot-blue{background:#3B82F6;box-shadow:0 0 0 2px #BFDBFE}
.dot-green{background:#22C55E;box-shadow:0 0 0 2px #BBF7D0}
.dot-gray{background:#9CA3AF;box-shadow:0 0 0 2px #E5E7EB}

/* KPI Cards */
.kpi{text-align:center;padding:20px;background:var(--card);border:1px solid var(--border);border-radius:12px}
.kpi-value{font-size:32px;font-weight:900;line-height:1.1}
.kpi-label{font-size:12px;color:var(--gray);margin-top:4px;font-weight:500}
.kpi-sub{font-size:11px;color:var(--gray);margin-top:2px}

/* Timeline */
.timeline{position:relative;padding-left:28px}
.timeline::before{content:'';position:absolute;left:8px;top:8px;bottom:8px;width:2px;background:linear-gradient(to bottom,#3B82F6,#E2E8F0)}
.tl-item{position:relative;margin-bottom:0}
.tl-dot{position:absolute;left:-24px;top:16px;width:16px;height:16px;border-radius:50%;border:2px solid;background:#fff;display:flex;align-items:center;justify-content:center}
.tl-dot-blue{border-color:#3B82F6;box-shadow:0 0 0 3px #BFDBFE}
.tl-dot-green{border-color:#22C55E;background:#22C55E}
.tl-dot-gray{border-color:#9CA3AF}
.tl-card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:16px;overflow:hidden;cursor:pointer;transition:all 0.2s}
.tl-card:hover{border-color:#93C5FD;box-shadow:0 4px 20px rgba(59,130,246,0.1)}
.tl-card.expanded{border-color:#3B82F6}
.tl-header{padding:16px 20px;display:flex;align-items:center;gap:12px}
.tl-date{font-size:12px;font-weight:700;color:var(--blue);min-width:80px}
.tl-title{font-size:14px;font-weight:700;color:var(--dark);flex:1}
.tl-body{padding:0 20px 16px;border-top:1px solid var(--border)}
.tl-body ul{list-style:none;display:flex;flex-direction:column;gap:6px;padding-top:12px}
.tl-body li{display:flex;gap:8px;font-size:13px;color:#374151;align-items:flex-start;line-height:1.5}
.tl-body li::before{content:'•';color:var(--blue);flex-shrink:0;margin-top:1px}

/* Solution map */
.sol-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;transition:all 0.2s}
.sol-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.08)}
.sol-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:12px}
.sol-title{font-size:14px;font-weight:700;margin-bottom:6px}
.sol-desc{font-size:12px;color:var(--gray);line-height:1.6}
.sol-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px}

/* Consortium */
.org-chart{display:flex;flex-direction:column;align-items:center;gap:0}
.org-top{display:flex;justify-content:center}
.org-line{width:2px;height:32px;background:#CBD5E1;margin:0 auto}
.org-row{display:flex;gap:24px;justify-content:center}
.org-node{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:16px 24px;text-align:center;min-width:140px}
.org-node.highlight{border-color:var(--blue);background:var(--blue-light)}
.org-node.customer{border-color:#7C3AED;background:var(--purple-light)}
.org-name{font-size:13px;font-weight:700;margin-bottom:4px}
.org-role{font-size:11px;color:var(--gray)}
.org-connector{display:flex;gap:24px;justify-content:center;height:2px;position:relative;margin:0 70px}
.org-connector::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:#CBD5E1}

/* Risks */
.risk-item{display:flex;gap:14px;padding:14px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:10px}
.risk-level{width:4px;border-radius:2px;flex-shrink:0}
.risk-level.high{background:var(--red)}
.risk-level.mid{background:var(--yellow)}
.risk-level.low{background:var(--green)}
.risk-title{font-size:13px;font-weight:700;margin-bottom:3px}
.risk-desc{font-size:12px;color:var(--gray);line-height:1.6}

/* Action items */
.action-item{display:flex;gap:12px;padding:12px 14px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;align-items:flex-start}
.action-check{width:18px;height:18px;border-radius:4px;border:2px solid #CBD5E1;flex-shrink:0;margin-top:1px}
.action-check.done{background:var(--green);border-color:var(--green);display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px}
.action-text{font-size:13px;color:var(--dark);flex:1;line-height:1.5}
.action-owner{font-size:11px;color:var(--blue);font-weight:600;margin-top:3px}

/* Decision box */
.decision-box{background:linear-gradient(135deg,#FFF7ED,#FEF3C7);border:2px solid #FCD34D;border-radius:12px;padding:20px 24px;margin-bottom:12px}
.decision-urgent{background:linear-gradient(135deg,#FEF2F2,#FEE2E2);border-color:#FCA5A5}
.decision-title{font-size:14px;font-weight:700;color:#92400E;margin-bottom:6px}
.decision-title.urgent{color:#991B1B}
.decision-desc{font-size:13px;color:#78350F;line-height:1.6}
.decision-desc.urgent{color:#7F1D1D}

/* Progress */
.progress-row{margin-bottom:12px}
.progress-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.progress-bar{height:8px;background:#E5E7EB;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:width 1s ease}

/* Responsive */
@media(max-width:900px){.app{grid-template-columns:1fr}.sidebar{position:static;height:auto}.grid3,.grid4{grid-template-columns:1fr 1fr}.page{padding:24px}}
@media(max-width:600px){.grid2,.grid3,.grid4{grid-template-columns:1fr}.page{padding:16px}}
</style>
</head>

      <div style={{display:'flex',gap:16,marginBottom:20}}>
        {[{label:'높음',color:'#DC2626',cnt:risks.filter(r=>r.level==='high').length},
          {label:'중간',color:'#CA8A04',cnt:risks.filter(r=>r.level==='mid').length},

          <div key={l.label} style={{display:'flex',alignItems:'center',gap:6,fontSize:13}}>
