<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KT Agentic AICC 경쟁사 분석</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --kt-blue: #0070C0;
    --kt-dark-blue: #003087;
    --kt-light-blue: #00A3E0;
    --kt-cyan: #00C9FF;
    --accent: #FF6B35;
    --gold: #FFD700;
    --bg-dark: #060B18;
    --bg-card: #0D1B2A;
    --bg-card2: #112240;
    --text-primary: #F0F4FF;
    --text-secondary: #8B9DC3;
    --border: rgba(0,112,192,0.3);
    --glow: rgba(0,163,224,0.4);
  }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Noto Sans KR', 'Inter', sans-serif;
    background: var(--bg-dark);
    color: var(--text-primary);
    overflow-x: hidden;
  }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-dark); }
  ::-webkit-scrollbar-thumb { background: var(--kt-blue); border-radius: 3px; }

  /* Animations */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideInLeft {
    from { opacity: 0; transform: translateX(-60px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes slideInRight {
    from { opacity: 0; transform: translateX(60px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 20px var(--glow); }
    50% { box-shadow: 0 0 50px var(--glow), 0 0 80px rgba(0,163,224,0.2); }
  }
  @keyframes counter {
    from { opacity: 0; transform: scale(0.5); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes orbit {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
  }
  @keyframes bgPulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.6; }
  }
  .animate-fadeInUp { animation: fadeInUp 0.8s ease forwards; }
  .animate-slideInLeft { animation: slideInLeft 0.8s ease forwards; }
  .animate-slideInRight { animation: slideInRight 0.8s ease forwards; }
  .animate-float { animation: float 3s ease-in-out infinite; }
  .animate-pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }

  /* Gradient text */
  .gradient-text {
    background: linear-gradient(135deg, var(--kt-cyan), var(--kt-blue), var(--kt-light-blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .gradient-text-gold {
    background: linear-gradient(135deg, #FFD700, #FF8C00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Cards */
  .glass-card {
    background: rgba(13,27,42,0.8);
    border: 1px solid var(--border);
    border-radius: 16px;
    backdrop-filter: blur(10px);
    transition: all 0.3s ease;
  }
  .glass-card:hover {
    border-color: rgba(0,163,224,0.6);
    box-shadow: 0 8px 40px rgba(0,112,192,0.3);
    transform: translateY(-4px);
  }

  /* Nav */
  .nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(6,11,24,0.95);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .nav-logo {
    font-size: 18px;
    font-weight: 700;
    color: var(--kt-cyan);
    letter-spacing: -0.5px;
  }
  .nav-links {
    display: flex;
    gap: 6px;
    list-style: none;
  }
  .nav-links a {
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    padding: 6px 12px;
    border-radius: 8px;
    transition: all 0.2s;
  }
  .nav-links a:hover {
    color: var(--kt-cyan);
    background: rgba(0,163,224,0.1);
  }

  /* Sections */
  .section {
    padding: 100px 60px;
    max-width: 1400px;
    margin: 0 auto;
  }
  .section-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--kt-cyan);
    margin-bottom: 12px;
  }
  .section-title {
    font-size: 42px;
    font-weight: 900;
    line-height: 1.2;
    margin-bottom: 16px;
  }
  .section-subtitle {
    font-size: 17px;
    color: var(--text-secondary);
    line-height: 1.7;
    max-width: 700px;
  }

  /* Hero */
  .hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    background: radial-gradient(ellipse at 20% 50%, rgba(0,112,192,0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(0,163,224,0.1) 0%, transparent 50%),
                var(--bg-dark);
  }
  .hero-bg-grid {
    position: absolute;
    inset: 0;
    background-image: linear-gradient(rgba(0,112,192,0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,112,192,0.08) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: bgPulse 4s ease-in-out infinite;
  }
  .hero-content {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 40px;
  }
  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(0,112,192,0.2);
    border: 1px solid rgba(0,163,224,0.4);
    border-radius: 100px;
    padding: 8px 20px;
    font-size: 13px;
    font-weight: 600;
    color: var(--kt-cyan);
    margin-bottom: 32px;
    letter-spacing: 1px;
  }
  .hero-title {
    font-size: clamp(48px, 8vw, 96px);
    font-weight: 900;
    line-height: 1.05;
    margin-bottom: 24px;
    letter-spacing: -2px;

  .hero-desc {
    font-size: 20px;
    color: var(--text-secondary);
    max-width: 640px;
    margin: 0 auto 48px;
    line-height: 1.7;
  }
  .hero-stats {
    display: flex;
    gap: 48px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .hero-stat {
    text-align: center;
  }
  .hero-stat-value {
    font-size: 48px;
    font-weight: 900;
    line-height: 1;
    margin-bottom: 4px;
  }
  .hero-stat-label {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 500;
  }
  .hero-divider {
    width: 1px;
    height: 60px;
    background: var(--border);
    align-self: center;
  }

  /* Timeline */
  .timeline {
    position: relative;
    padding-left: 40px;
  }
  .timeline::before {
    content: '';
    position: absolute;
    left: 12px;
    top: 0;
    bottom: 0;
    width: 2px;
    background: linear-gradient(to bottom, var(--kt-blue), var(--kt-cyan));
  }
  .timeline-item {
    position: relative;
    padding-bottom: 48px;
  }
  .timeline-dot {
    position: absolute;
    left: -34px;
    top: 6px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 2px solid var(--kt-cyan);
    background: var(--bg-dark);
    box-shadow: 0 0 12px var(--glow);
  }
  .timeline-dot.active {
    background: var(--kt-cyan);
    animation: pulse-glow 2s infinite;
  }

  /* Metric cards */
  .metric-card {
    background: linear-gradient(135deg, rgba(0,112,192,0.15), rgba(0,163,224,0.05));
    border: 1px solid rgba(0,163,224,0.3);
    border-radius: 20px;
    padding: 36px;
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
  }
  .metric-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--kt-blue), var(--kt-cyan));
  }
  .metric-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 20px 60px rgba(0,112,192,0.3);
  }
  .metric-before {
    font-size: 36px;
    font-weight: 700;
    color: var(--text-secondary);
    text-decoration: line-through;
  }
  .metric-arrow {
    font-size: 28px;
    color: var(--kt-cyan);
    margin: 8px 0;
  }
  .metric-after {
    font-size: 72px;
    font-weight: 900;
    line-height: 1;
    margin-bottom: 8px;
  }
  .metric-label {
    font-size: 15px;
    color: var(--text-secondary);
    font-weight: 500;
  }

  /* Feature grid */
  .feature-card {
    background: var(--bg-card2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    transition: all 0.3s ease;
    cursor: default;
  }
  .feature-card:hover {
    border-color: var(--kt-blue);
    box-shadow: 0 0 30px rgba(0,112,192,0.2);
  }
  .feature-icon {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    margin-bottom: 16px;
    background: linear-gradient(135deg, rgba(0,112,192,0.3), rgba(0,163,224,0.1));
  }
  .feature-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--text-primary);
  }
  .feature-desc {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.6;
  }

  /* Architecture */
  .arch-box {
    background: rgba(0,112,192,0.12);
    border: 1px solid rgba(0,163,224,0.3);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    font-weight: 600;
    font-size: 14px;
    position: relative;
  }
  .arch-box.highlight {
    background: linear-gradient(135deg, rgba(0,112,192,0.3), rgba(0,163,224,0.15));
    border-color: var(--kt-cyan);
    box-shadow: 0 0 20px rgba(0,163,224,0.2);
  }
  .arch-arrow {
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--kt-cyan);
    font-size: 24px;
  }

  /* Image gallery */
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }
  .gallery-item {
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
    transition: all 0.3s ease;
    cursor: pointer;
    position: relative;

  .gallery-item:hover {

    box-shadow: 0 0 30px rgba(0,163,224,0.3);
    transform: scale(1.02);

    height: 200px;
    object-fit: cover;
    display: block;

  .gallery-caption {
    background: rgba(13,27,42,0.95);
    padding: 12px 16px;
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 500;

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(6,11,24,0.95);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
    cursor: pointer;
  }
  .modal-img {
    max-width: 100%;
    max-height: 90vh;
    border-radius: 12px;
    box-shadow: 0 0 80px rgba(0,112,192,0.4);
    cursor: default;
  }

  /* Use case card */
  .usecase-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    transition: all 0.3s ease;
  }
  .usecase-card:hover {
    border-color: var(--kt-blue);
    box-shadow: 0 0 40px rgba(0,112,192,0.25);
  }
  .usecase-icon {
    font-size: 40px;
    margin-bottom: 16px;
    display: block;
  }

  /* Roadmap */
  .roadmap-phase {
    border-radius: 16px;
    padding: 28px;
    position: relative;
    overflow: hidden;
  }
  .roadmap-phase.past {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
  }
  .roadmap-phase.present {
    background: rgba(0,112,192,0.15);
    border: 1px solid rgba(0,163,224,0.4);
  }
  .roadmap-phase.future {
    background: linear-gradient(135deg, rgba(0,112,192,0.2), rgba(0,163,224,0.1));
    border: 1px solid var(--kt-cyan);
    box-shadow: 0 0 30px rgba(0,163,224,0.2);
  }

  /* Competitive grid */
  .comp-item {
    background: var(--bg-card2);
    border-radius: 16px;
    padding: 28px;
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* Tags */
  .tag {
    display: inline-block;
    background: rgba(0,112,192,0.2);
    border: 1px solid rgba(0,163,224,0.3);
    border-radius: 100px;
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 600;
    color: var(--kt-cyan);
    letter-spacing: 0.5px;
  }
  .tag.red {
    background: rgba(255,107,53,0.2);
    border-color: rgba(255,107,53,0.4);
    color: #FF8C65;
  }
  .tag.gold {
    background: rgba(255,215,0,0.15);
    border-color: rgba(255,215,0,0.3);
    color: var(--gold);
  }

  /* Progress bar */
  .progress-bar {
    height: 8px;
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
    overflow: hidden;
    margin-top: 8px;
  }
  .progress-fill {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--kt-blue), var(--kt-cyan));
    transition: width 1.5s ease;
  }

  /* Section divider */
  .section-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin: 0 60px;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .section { padding: 60px 24px; }
    .section-title { font-size: 28px; }
    .nav { padding: 0 20px; }
    .nav-links { display: none; }
    .hero-title { font-size: 42px; }
    .hero-stats { gap: 24px; }
    .hero-divider { display: none; }
  }

  /* Scroll indicator */
  .scroll-indicator {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    color: var(--text-secondary);
    font-size: 12px;
    letter-spacing: 2px;
  }
  .scroll-mouse {
    width: 24px;
    height: 38px;
    border: 2px solid var(--text-secondary);
    border-radius: 12px;
    position: relative;
  }
  .scroll-mouse::after {
    content: '';
    position: absolute;
    top: 6px;
    left: 50%;
    transform: translateX(-50%);
    width: 4px;
    height: 8px;
    background: var(--kt-cyan);
    border-radius: 2px;
    animation: float 1.5s ease-in-out infinite;
  }
</style>
</head>

function AnimatedNumber({ target, suffix = '' }) {
  const [value, setValue] = useState(0);
  const ref = useRef();
  useEffect(() => {
    const observer = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) {
        let start = 0;
        const step = target / 60;
        const timer = setInterval(() => {
          start += step;
          if (start >= target) { setValue(target); clearInterval(timer); }
          else setValue(Math.floor(start));
        }, 16);
      }
    }, { threshold: 0.5 });
    if (ref.current) observer.observe(ref.current);
    return () => observer.disconnect();
  }, [target]);
  return <span ref={ref}>{value}{suffix}</span>;
}

function Modal({ src, title, onClose }) {
  useEffect(() => {
    const handler = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [onClose]);
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:16}}>
        <img className="modal-img" src={src} alt={title} onClick={e=>e.stopPropagation()} />
        <p style={{color:'#8B9DC3',fontSize:14}}>{title}</p>
        <p style={{color:'#556',fontSize:12}}>ESC 또는 클릭하여 닫기</p>
      </div>
    </div>
  );
}
