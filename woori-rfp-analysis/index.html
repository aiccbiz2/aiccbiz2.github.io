<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우리금융캐피탈 AI혁신 플랫폼 RFP 분석서</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #003087;
    --primary-light: #0052cc;
    --accent: #e8b800;
    --bg: #0a0e1a;
    --bg2: #111827;
    --card: #1e293b;
    --border: rgba(255,255,255,0.08);
    --text: #e2e8f0;
    --muted: #94a3b8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--primary-light); border-radius: 3px; }

  /* Layout */
  .layout { display: flex; }
  .sidebar {
    width: 260px; min-width: 260px; background: var(--bg2);
    border-right: 1px solid var(--border); position: fixed; top: 0; left: 0;
    height: 100vh; overflow-y: auto; z-index: 100;
    display: flex; flex-direction: column;
  }
  .main { margin-left: 260px; flex: 1; padding: 2rem 2.5rem; }

  /* Sidebar */
  .sidebar-logo {
    padding: 1.5rem; border-bottom: 1px solid var(--border);
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
  }
  .sidebar-logo .company { font-size: 0.72rem; color: rgba(255,255,255,0.7); letter-spacing: 1px; text-transform: uppercase; }
  .sidebar-logo .title { font-size: 0.92rem; font-weight: 700; color: white; margin-top: 4px; line-height: 1.4; }
  .sidebar-logo .badge { display: inline-block; background: var(--accent); color: #000; font-size: 0.65rem; font-weight: 700; padding: 2px 8px; border-radius: 20px; margin-top: 8px; }
  .nav-section { padding: 1rem 0; border-bottom: 1px solid var(--border); flex: 1; }
  .nav-label { font-size: 0.65rem; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; padding: 0 1.25rem 0.5rem; }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 0.6rem 1.25rem;
    cursor: pointer; transition: all 0.2s; font-size: 0.82rem; color: var(--muted);
    border-left: 3px solid transparent; text-decoration: none;
  }
  .nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
  .nav-item.active { background: rgba(0,82,204,0.15); color: #60a5fa; border-left-color: #60a5fa; }
  .nav-icon { font-size: 1rem; width: 20px; text-align: center; }
  .sidebar-meta { padding: 1rem 1.25rem; border-top: 1px solid var(--border); }
  .sidebar-meta .meta-item { font-size: 0.72rem; color: var(--muted); margin-bottom: 4px; }
  .confidential-badge { display: flex; align-items: center; gap: 6px; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: 6px; padding: 6px 10px; margin-top: 8px; }
  .confidential-badge span { font-size: 0.7rem; color: #f87171; font-weight: 600; }

  /* Section anchor offset (fixed sidebar header compensation) */
  .page-section { padding-top: 2rem; margin-bottom: 1rem; }
  .section-header { margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
  .section-header h2 { font-size: 1.5rem; font-weight: 800; margin-bottom: 4px; }
  .section-header p { color: var(--muted); font-size: 0.875rem; }

  /* Hero */
  .hero {
    background: linear-gradient(135deg, #0a1628 0%, #0d2348 50%, #0a1628 100%);
    border-radius: 16px; padding: 3rem; margin-bottom: 2rem; position: relative; overflow: hidden;
    border: 1px solid rgba(0,82,204,0.3);
  }
  .hero::before {
    content: ''; position: absolute; top: -50%; right: -10%; width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(0,82,204,0.15) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-tag { display: inline-flex; align-items: center; gap: 6px; background: rgba(232,184,0,0.15); border: 1px solid rgba(232,184,0,0.4); color: var(--accent); font-size: 0.75rem; font-weight: 600; padding: 4px 12px; border-radius: 20px; margin-bottom: 1rem; }
  .hero h1 { font-size: 2rem; font-weight: 900; line-height: 1.3; margin-bottom: 0.5rem; position: relative; }
  .hero h1 span { color: #60a5fa; }
  .hero-sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; position: relative; }
  .hero-kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; position: relative; }
  .kpi-card { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; text-align: center; }
  .kpi-value { font-size: 1.8rem; font-weight: 900; color: #60a5fa; line-height: 1; }
  .kpi-label { font-size: 0.72rem; color: var(--muted); margin-top: 6px; }

  /* Cards */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
  .card-title { font-size: 1rem; font-weight: 700; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }

  /* Grid */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }

  /* Table */
  .rfp-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  .rfp-table th { background: rgba(0,82,204,0.2); color: #93c5fd; padding: 0.7rem 1rem; text-align: left; font-weight: 600; border-bottom: 1px solid rgba(0,82,204,0.3); }
  .rfp-table td { padding: 0.65rem 1rem; border-bottom: 1px solid var(--border); vertical-align: top; line-height: 1.5; }
  .rfp-table tr:last-child td { border-bottom: none; }
  .rfp-table tr:hover td { background: rgba(255,255,255,0.03); }

  /* Badge */
  .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
  .badge-blue { background: rgba(59,130,246,0.2); color: #60a5fa; border: 1px solid rgba(59,130,246,0.3); }
  .badge-green { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
  .badge-yellow { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
  .badge-red { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
  .badge-purple { background: rgba(168,85,247,0.15); color: #c084fc; border: 1px solid rgba(168,85,247,0.3); }

  /* Timeline */
  .timeline { position: relative; padding-left: 2rem; }
  .timeline::before { content: ''; position: absolute; left: 8px; top: 0; bottom: 0; width: 2px; background: linear-gradient(to bottom, var(--primary-light), transparent); }
  .timeline-item { position: relative; margin-bottom: 1.5rem; }
  .timeline-dot { position: absolute; left: -1.75rem; top: 4px; width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--primary-light); background: var(--bg); }
  .timeline-dot.active { background: var(--primary-light); box-shadow: 0 0 10px rgba(0,82,204,0.5); }
  .timeline-date { font-size: 0.75rem; color: #60a5fa; font-weight: 600; margin-bottom: 4px; }
  .timeline-title { font-size: 0.9rem; font-weight: 600; margin-bottom: 4px; }
  .timeline-desc { font-size: 0.8rem; color: var(--muted); }

  /* Scope cards */
  .scope-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
  .scope-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; transition: all 0.2s; }
  .scope-card:hover { border-color: var(--primary-light); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
  .scope-icon { font-size: 2rem; margin-bottom: 0.75rem; }
  .scope-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 0.5rem; color: #93c5fd; }
  .scope-desc { font-size: 0.78rem; color: var(--muted); line-height: 1.5; }
  .scope-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 0.75rem; }
  .scope-tag { font-size: 0.65rem; padding: 2px 8px; border-radius: 10px; background: rgba(0,82,204,0.2); color: #93c5fd; }

  /* Difficulty bar */
  .diff-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.75rem; }
  .diff-label { font-size: 0.8rem; width: 210px; flex-shrink: 0; }
  .diff-bar-wrap { flex: 1; height: 8px; background: rgba(255,255,255,0.08); border-radius: 4px; overflow: hidden; }
  .diff-bar { height: 100%; border-radius: 4px; }
  .diff-5 { width: 100%; background: linear-gradient(to right, #ef4444, #dc2626); }
  .diff-4 { width: 80%; background: linear-gradient(to right, #f59e0b, #d97706); }
  .diff-3 { width: 60%; background: linear-gradient(to right, #22c55e, #16a34a); }

  /* Insight cards */
  .insight-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; }
  .insight-card.highlight { border-color: rgba(232,184,0,0.4); background: linear-gradient(135deg, rgba(232,184,0,0.05) 0%, var(--card) 100%); }
  .insight-card.danger { border-color: rgba(239,68,68,0.4); background: linear-gradient(135deg, rgba(239,68,68,0.05) 0%, var(--card) 100%); }
  .insight-num { font-size: 2rem; font-weight: 900; color: rgba(255,255,255,0.08); float: right; line-height: 1; }
  .insight-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .insight-title { font-size: 0.92rem; font-weight: 700; margin-bottom: 6px; }
  .insight-body { font-size: 0.8rem; color: var(--muted); line-height: 1.6; }

  /* Checklist */
  .checklist-item { display: flex; align-items: flex-start; gap: 10px; padding: 0.6rem 0; border-bottom: 1px solid var(--border); }
  .checklist-item:last-child { border-bottom: none; }
  .check-icon { width: 20px; height: 20px; border-radius: 50%; border: 2px solid; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; flex-shrink: 0; margin-top: 1px; }
  .check-icon.required { border-color: #ef4444; color: #ef4444; }
  .check-icon.important { border-color: #f59e0b; color: #f59e0b; }
  .check-icon.normal { border-color: #22c55e; color: #22c55e; }
  .checklist-text { font-size: 0.82rem; line-height: 1.5; }

  /* Deadline progress */
  .deadline-bar { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
  .deadline-track { display: flex; align-items: flex-start; margin-top: 1rem; }
  .deadline-step { flex: 1; text-align: center; position: relative; }
  .deadline-step::before { content: ''; position: absolute; top: 9px; left: -50%; right: 50%; height: 2px; background: var(--border); }
  .deadline-step:first-child::before { display: none; }
  .deadline-step.done::before { background: #22c55e; }
  .deadline-dot { width: 20px; height: 20px; border-radius: 50%; background: var(--border); margin: 0 auto 8px; position: relative; z-index: 1; border: 2px solid var(--border); }
  .deadline-step.done .deadline-dot { background: #22c55e; border-color: #22c55e; }
  .deadline-step.current .deadline-dot { background: #f59e0b; border-color: #f59e0b; box-shadow: 0 0 12px rgba(245,158,11,0.6); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 10px rgba(245,158,11,0.5)} 50%{box-shadow:0 0 20px rgba(245,158,11,0.9)} }
  .deadline-label { font-size: 0.65rem; color: var(--muted); line-height: 1.4; white-space: pre-line; }
  .deadline-step.current .deadline-label { color: #fbbf24; font-weight: 600; }

  /* Alert */
  .alert { border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 1rem; font-size: 0.82rem; display: flex; gap: 10px; line-height: 1.6; }
  .alert-warning { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3); color: #fcd34d; }
  .alert-danger { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
  .alert-info { background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.3); color: #93c5fd; }
  .alert-success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #86efac; }
  .alert-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }

  /* Sys grid */
  .sys-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
  .sys-card { background: rgba(0,82,204,0.08); border: 1px solid rgba(0,82,204,0.2); border-radius: 10px; padding: 1rem; }
  .sys-card-title { font-size: 0.75rem; color: #93c5fd; font-weight: 600; margin-bottom: 0.75rem; }
  .sys-item { display: flex; justify-content: space-between; font-size: 0.78rem; padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .sys-item:last-child { border-bottom: none; }
  .sys-item-key { color: var(--muted); }
  .sys-item-val { color: var(--text); font-weight: 500; text-align: right; max-width: 60%; }

  /* Req tabs */
  .req-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .req-tab { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 0.8rem; cursor: pointer; font-family: inherit; transition: all 0.2s; }
  .req-tab.active { border-color: #60a5fa; background: rgba(59,130,246,0.15); color: #60a5fa; }

  /* Section divider */
  .section-divider { border: none; border-top: 1px solid var(--border); margin: 3rem 0; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const NAV = [
  { id: 'overview',     icon: '🏠', label: '사업 개요' },
  { id: 'environment',  icon: '🖥️', label: '현재 시스템 환경' },
  { id: 'scope',        icon: '📋', label: '제안 범위' },
  { id: 'requirements', icon: '⚙️', label: '주요 기능 요건' },
  { id: 'schedule',     icon: '📅', label: '추진 일정' },
  { id: 'submission',   icon: '📁', label: '제출 서류' },
  { id: 'insights',     icon: '💡', label: '핵심 인사이트' },
  { id: 'risks',        icon: '⚠️', label: '리스크 분석' },
];

function scrollTo(id) {
  const el = document.getElementById(id);
  if (el) {
    const y = el.getBoundingClientRect().top + window.scrollY - 24;
    window.scrollTo({ top: y, behavior: 'smooth' });
  }
}

function App() {
  const [activeNav, setActiveNav] = useState('overview');

  useEffect(() => {
    const observer = new IntersectionObserver(
      (entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) setActiveNav(entry.target.id);
        });
      },
      { rootMargin: '-30% 0px -60% 0px', threshold: 0 }
    );
    NAV.forEach(n => {
      const el = document.getElementById(n.id);
      if (el) observer.observe(el);
    });
    return () => observer.disconnect();
  }, []);

  return (
    <div className="layout">
      <nav className="sidebar">
        <div className="sidebar-logo">
          <div className="company">🏦 우리금융캐피탈</div>
          <div className="title">전사 AI혁신 서비스<br/>플랫폼 구축 RFP 분석</div>
          <div className="badge">RFP 분석서</div>
        </div>
        <div className="nav-section">
          <div className="nav-label">분석 목차</div>
          {NAV.map(n => (
            <div key={n.id}
              className={`nav-item ${activeNav === n.id ? 'active' : ''}`}
              onClick={() => scrollTo(n.id)}
            >
              <span className="nav-icon">{n.icon}</span>
              <span>{n.label}</span>
            </div>
          ))}
        </div>
        <div className="sidebar-meta">
          <div className="meta-item">📅 발행일: 2026.03.24</div>
          <div className="meta-item">📄 총 28페이지</div>
          <div className="confidential-badge">
            <span>🔒 CONFIDENTIAL</span>
          </div>
        </div>
      </nav>

      <main className="main">
        <OverviewSection />
        <hr className="section-divider" />
        <EnvironmentSection />
        <hr className="section-divider" />
        <ScopeSection />
        <hr className="section-divider" />
        <RequirementsSection />
        <hr className="section-divider" />
        <ScheduleSection />
        <hr className="section-divider" />
        <SubmissionSection />
        <hr className="section-divider" />
        <InsightsSection />
        <hr className="section-divider" />
        <RisksSection />
        <div style={{height:'4rem'}} />
      </main>
    </div>
  );
}

/* ────────── 사업 개요 ────────── */
function OverviewSection() {
  return (
    <div id="overview" className="page-section">
      <div className="hero">
        <div className="hero-tag">📑 제안요청서 (RFP) 분석</div>
        <h1>우리금융캐피탈<br/><span>전사 AI혁신 서비스 플랫폼</span> 구축 사업</h1>
        <div className="hero-sub">2026.03.24 발행 | AX추진센터 | 계약일로부터 9개월 구축</div>
        <div className="hero-kpis">
          {[
            { value: '9개월', label: '구축 기간 (안정화 포함)' },
            { value: '5년',   label: 'TCO 기준 가격 평가' },
            { value: '6개',   label: '제안 영역 (AI 솔루션)' },
            { value: '16일',  label: '제안서 작성 기간' },
          ].map((k, i) => (
            <div key={i} className="kpi-card">
              <div className="kpi-value">{k.value}</div>
              <div className="kpi-label">{k.label}</div>
            </div>
          ))}
        </div>
      </div>

      <div className="grid-2">
        <div className="card">
          <div className="card-title">🎯 사업 배경 및 목표</div>
          <p style={{fontSize:'0.82rem',color:'var(--muted)',marginBottom:'1rem',lineHeight:'1.6'}}>
            AI 혁신 서비스 플랫폼 구축으로 <strong style={{color:'var(--text)'}}>고객 경험 혁신</strong> 및 <strong style={{color:'var(--text)'}}>업무 생산성 제고</strong>를 목표로 한다.
          </p>
          {[
            { num:'①', title:'대고객 AI 서비스 혁신', desc:'AI 차량·금융 추천 Agent 구현' },
            { num:'②', title:'고객 상담 체계 AI 혁신', desc:'디지털ARS + 상담 어드바이저' },
            { num:'③', title:'내부 업무혁신 지식 AI Agent', desc:'On-Premise LLM + RAG 기반 업무 어드바이저' },
            { num:'④', title:'AI OCR 기반 업무 프로세스 혁신', desc:'문서 자동인식 및 업무 연계' },
            { num:'⑤', title:'안정적 인프라 구축', desc:'IDC 내 GPU 서버 및 네트워크 구축' },
          ].map((g, i) => (
            <div key={i} style={{display:'flex',gap:'10px',padding:'0.5rem 0',borderBottom:'1px solid var(--border)'}}>
              <span style={{fontSize:'0.8rem',fontWeight:'700',color:'#60a5fa',minWidth:'20px'}}>{g.num}</span>
              <div>
                <div style={{fontSize:'0.85rem',fontWeight:'600'}}>{g.title}</div>
                <div style={{fontSize:'0.75rem',color:'var(--muted)'}}>{g.desc}</div>
              </div>
            </div>
          ))}
        </div>
        <div className="card">
          <div className="card-title">📌 사업 기본 정보</div>
          <table className="rfp-table">
            <tbody>
              {[
                ['사업명','전사 AI혁신 서비스 플랫폼 구축'],
                ['발주처','우리금융캐피탈 AX추진센터'],
                ['구축기간','계약일로부터 9개월'],
                ['계약방식','우선협상 대상 업체 선정 후 협상'],
                ['담당자','김효섭 차장 / 안병희 대리'],
                ['제출처','강남구 테헤란로 301, 삼정빌딩 14F'],
                ['하자보증','완료일로부터 12개월'],
                ['가격평가','5년 TCO 기준'],
